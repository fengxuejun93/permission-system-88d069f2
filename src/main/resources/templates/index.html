<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('首页 - 校内网')}"></head>
<body>
<nav th:replace="~{fragments :: topnav('home')}"></nav>

<div class="main-container">
    <aside th:replace="~{fragments :: sidebar}"></aside>

    <div class="content">
        <!-- 发布动态 -->
        <div class="card">
            <div class="card-body publish-box">
                <textarea id="postContent" placeholder="分享你的校园生活..."></textarea>
                <input type="text" id="postPhotoUrl" class="photo-url-input" placeholder="照片URL（可选，直接粘贴图片链接）">
                <div class="publish-actions">
                    <div style="display:flex;gap:6px;align-items:center;">
                        <select id="postVisibility" class="visibility-select">
                            <option value="PUBLIC">所有人可见</option>
                            <option value="FRIENDS">仅好友可见</option>
                            <option value="PRIVATE">仅自己可见</option>
                        </select>
                        <select id="postStatus" class="status-select">
                            <option value="PUBLISHED">直接发布</option>
                            <option value="DRAFT">存为草稿</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="publishPost()">发布</button>
                </div>
            </div>
        </div>

        <!-- 搜索筛选区域 -->
        <div class="card">
            <div class="card-body" style="padding:10px 16px;">
                <form method="GET" action="/" id="filterForm" style="display:flex;flex-direction:column;gap:8px;">
                    <div style="display:flex;gap:8px;align-items:center;">
                        <span style="font-size:13px;color:#666;font-weight:600;">搜索：</span>
                        <input type="text" name="keyword" class="search-input" placeholder="搜索发布人、班级、动态文字、照片说明..." th:value="${filterKeyword}">
                        <button type="submit" class="btn btn-primary btn-sm">搜索</button>
                    </div>
                    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                        <span style="font-size:13px;color:#666;font-weight:600;">筛选：</span>
                        <select name="visibility" class="filter-select" onchange="applyFilter()">
                            <option value="">全部可见范围</option>
                            <option value="PUBLIC" th:selected="${filterVisibility == 'PUBLIC'}">公开</option>
                            <option value="FRIENDS" th:selected="${filterVisibility == 'FRIENDS'}">仅好友</option>
                            <option value="PRIVATE" th:selected="${filterVisibility == 'PRIVATE'}">仅自己</option>
                        </select>
                        <select name="status" class="filter-select" onchange="applyFilter()">
                            <option value="">全部状态</option>
                            <option value="PUBLISHED" th:selected="${filterStatus == 'PUBLISHED'}">已发布</option>
                            <option value="DRAFT" th:selected="${filterStatus == 'DRAFT'}">草稿</option>
                            <option value="HIDDEN" th:selected="${filterStatus == 'HIDDEN'}">已隐藏</option>
                        </select>
                        <select name="authorId" class="filter-select" onchange="applyFilter()">
                            <option value="">全部作者</option>
                            <option th:each="u : ${allUsers}" th:value="${u.id}" th:selected="${filterAuthorId != null && filterAuthorId == u.id.toString()}" th:text="${u.displayName}">用户</option>
                        </select>
                        <select name="relationship" class="filter-select" onchange="applyFilter()">
                            <option value="">全部关系</option>
                            <option value="SELF" th:selected="${filterRelationship == 'SELF'}">自己</option>
                            <option value="FRIEND" th:selected="${filterRelationship == 'FRIEND'}">好友</option>
                            <option value="SENT" th:selected="${filterRelationship == 'SENT'}">已申请</option>
                            <option value="RECEIVED" th:selected="${filterRelationship == 'RECEIVED'}">待我处理</option>
                            <option value="NONE" th:selected="${filterRelationship == 'NONE'}">陌生人</option>
                        </select>
                        <select name="hasComment" class="filter-select" onchange="applyFilter()">
                            <option value="">有无评论</option>
                            <option value="yes" th:selected="${filterHasComment == 'yes'}">有评论</option>
                            <option value="no" th:selected="${filterHasComment == 'no'}">无评论</option>
                        </select>
                        <a href="/" class="btn btn-outline btn-sm">清除筛选</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- 动态列表 -->
        <div class="card">
            <div class="card-header">
                动态
                <span th:if="${filterVisibility != null or filterStatus != null or filterAuthorId != null or filterKeyword != null or filterRelationship != null or filterHasComment != null}" style="font-weight:normal;font-size:12px;color:#e65100;">（已筛选）</span>
            </div>
            <div th:each="item : ${feedItems}" class="feed-item">
                <!-- 管理员标记：被隐藏/缺照片 -->
                <div th:if="${item.adminHidden}" class="admin-mark admin-mark-hidden">[管理员视角] 此动态已被作者隐藏</div>
                <div th:if="${item.adminMissingPhoto}" class="admin-mark admin-mark-missing">[管理员视角] 内容提及照片但无照片附件</div>

                <div class="feed-header">
                    <a th:href="@{/profile/{id}(id=${item.author.id})}"><img th:src="${item.author.avatar}" alt=""></a>
                    <div class="feed-user-info">
                        <a th:href="@{/profile/{id}(id=${item.author.id})}" class="feed-user-name" th:text="${item.author.displayName}">用户</a>
                        <div class="feed-meta">
                            <span th:text="${item.author.className}">班级</span>
                            <!-- 角色标识 -->
                            <span th:if="${item.author.role == T(com.campus.model.UserRole).SYSTEM_ADMIN}" class="role-tag role-tag-sys">系统管理员</span>
                            <span th:if="${item.author.role == T(com.campus.model.UserRole).CLASS_ADMIN}" class="role-tag role-tag-class">班级管理员</span>
                            <span class="visibility-tag" th:classappend="${item.post.visibility.toString().toLowerCase()}" th:text="${item.post.visibility == T(com.campus.model.Visibility).PUBLIC} ? '公开' : (${item.post.visibility == T(com.campus.model.Visibility).FRIENDS} ? '好友可见' : '仅自己可见')"></span>
                            <span class="status-tag" th:classappend="${item.post.status.toString().toLowerCase()}" th:if="${item.post.status != T(com.campus.model.PostStatus).PUBLISHED}" th:text="${item.post.status == T(com.campus.model.PostStatus).DRAFT} ? '草稿' : '已隐藏'"></span>
                        </div>
                    </div>
                </div>
                <div class="feed-content" th:text="${item.post.content}">内容</div>
                <div class="feed-photos" th:if="${item.post.photoUrls.size() > 0}">
                    <img th:each="url : ${item.post.photoUrls}" th:src="${url}" alt="照片" loading="lazy">
                </div>
                <div class="post-time" th:text="${#temporals.format(item.post.createdAt, 'yyyy-MM-dd HH:mm')}">时间</div>
                <div class="feed-actions">
                    <span class="like-btn" th:classappend="${item.hasLiked} ? 'liked'" th:attr="onclick='toggleLike(' + ${item.post.id} + ', this)'">
                        <span th:text="${item.hasLiked} ? '&#9829;' : '&#9825;'">&#9825;</span>
                        <span class="like-count" th:text="${item.likeCount}">0</span>
                    </span>
                    <a th:href="@{/post/{id}(id=${item.post.id})}">评论 (<span th:text="${item.commentCount}">0</span>)</a>
                </div>
                <!-- 本人操作区 -->
                <div class="post-ops" th:if="${item.post.userId == currentUserId}">
                    <select onchange="changePostVisibility(this.dataset.postId, this.value)" th:attr="data-post-id=${item.post.id}">
                        <option value="PUBLIC" th:selected="${item.post.visibility == T(com.campus.model.Visibility).PUBLIC}">公开</option>
                        <option value="FRIENDS" th:selected="${item.post.visibility == T(com.campus.model.Visibility).FRIENDS}">仅好友</option>
                        <option value="PRIVATE" th:selected="${item.post.visibility == T(com.campus.model.Visibility).PRIVATE}">仅自己</option>
                    </select>
                    <button th:if="${item.post.status == T(com.campus.model.PostStatus).PUBLISHED}" class="btn btn-outline btn-sm" th:attr="onclick='changePostStatus(' + ${item.post.id} + ', &quot;HIDDEN&quot;)'">隐藏</button>
                    <button th:if="${item.post.status == T(com.campus.model.PostStatus).HIDDEN}" class="btn btn-success btn-sm" th:attr="onclick='changePostStatus(' + ${item.post.id} + ', &quot;PUBLISHED&quot;)'">恢复</button>
                    <button th:if="${item.post.status == T(com.campus.model.PostStatus).DRAFT}" class="btn btn-success btn-sm" th:attr="onclick='changePostStatus(' + ${item.post.id} + ', &quot;PUBLISHED&quot;)'">发布</button>
                    <button class="btn btn-danger btn-sm" th:attr="onclick='deletePost(' + ${item.post.id} + ')'">删除</button>
                </div>
                <!-- 管理员操作区（恢复被他人隐藏的非私密动态） -->
                <div class="post-ops" th:if="${isAdmin and item.post.userId != currentUserId and item.post.status == T(com.campus.model.PostStatus).HIDDEN and item.post.visibility != T(com.campus.model.Visibility).PRIVATE}">
                    <button class="btn btn-success btn-sm" th:attr="onclick='adminRestorePost(' + ${item.post.id} + ')'">恢复此动态</button>
                </div>
            </div>
            <!-- 空状态 -->
            <div th:if="${#lists.isEmpty(feedItems)}" class="card-body empty-state">
                <div class="empty-icon">&#128269;</div>
                <div class="empty-title">无匹配的动态</div>
                <div class="empty-desc">尝试调整搜索或筛选条件</div>
                <div class="empty-actions">
                    <a href="/" class="btn btn-outline btn-sm">清除筛选，返回全部</a>
                    <a href="/friends" class="btn btn-primary btn-sm">去好友页申请好友</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:replace="~{fragments :: scripts}"></script>
<script>
function applyFilter() {
    var form = document.getElementById('filterForm');
    form.submit();
}
</script>
</body>
</html>
