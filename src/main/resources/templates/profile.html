<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${profileUser.displayName} + ' - 校内网')}"></head>
<body>
<nav th:replace="~{fragments :: topnav('home')}"></nav>

<div class="main-container">
    <aside th:replace="~{fragments :: sidebar}"></aside>

    <div class="content">
        <!-- 用户信息 -->
        <div class="card">
            <div class="profile-header">
                <img th:src="${profileUser.avatar}" alt="">
                <div class="profile-name" th:text="${profileUser.displayName}">用户</div>
                <div class="profile-meta">
                    <span th:text="${profileUser.className}">班级</span>
                    <span style="margin-left:12px;">
                        <span class="online-dot" th:classappend="${profileUser.online} ? 'on' : 'off'"></span>
                        <span th:text="${profileUser.online} ? '在线' : '离线'">在线</span>
                    </span>
                    <span style="margin-left:12px;" th:text="${profileUser.relationshipStatus}">单身</span>
                </div>
                <div class="profile-bio" th:if="${profileUser.bio}" th:text="${profileUser.bio}">签名</div>
                <div class="profile-actions" th:if="${!isSelf}">
                    <button th:if="${relationship == 'NONE'}" class="btn btn-primary btn-sm" th:attr="onclick='sendRequest(' + ${profileUser.id} + ', this)'">加好友</button>
                    <button th:if="${relationship == 'SENT'}" class="btn btn-sm btn-outline" disabled>已申请</button>
                    <button th:if="${relationship == 'RECEIVED'}" class="btn btn-sm btn-outline" disabled>对方已申请</button>
                    <span th:if="${relationship == 'FRIEND'}" style="color:#27ae60;font-size:14px;font-weight:600;">已互为好友</span>
                </div>
            </div>
        </div>

        <!-- 用户动态 -->
        <div class="card">
            <div class="card-header">
                动态
                <span style="font-weight:normal;font-size:12px;color:#888;" th:text="'(' + ${userPosts.size()} + '条可见)'"></span>
            </div>
            <div th:each="post : ${userPosts}" class="feed-item">
                <div class="feed-header">
                    <img th:src="${profileUser.avatar}" alt="">
                    <div class="feed-user-info">
                        <span class="feed-user-name" th:text="${profileUser.displayName}">用户</span>
                        <div class="feed-meta">
                            <span class="visibility-tag" th:classappend="${post.visibility.toString().toLowerCase()}" th:text="${post.visibility == T(com.campus.model.Visibility).PUBLIC} ? '公开' : (${post.visibility == T(com.campus.model.Visibility).FRIENDS} ? '好友可见' : '仅自己可见')"></span>
                        </div>
                    </div>
                </div>
                <div class="feed-content" th:text="${post.content}">内容</div>
                <div class="feed-photos" th:if="${post.photoUrls.size() > 0}">
                    <img th:each="url : ${post.photoUrls}" th:src="${url}" alt="照片">
                </div>
                <div class="feed-actions">
                    <a th:href="@{/post/{id}(id=${post.id})}">查看详情</a>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(userPosts)}" class="card-body" style="text-align:center;color:#999;">暂无可见动态</div>
        </div>
    </div>
</div>

<script th:replace="~{fragments :: scripts}"></script>
</body>
</html>
