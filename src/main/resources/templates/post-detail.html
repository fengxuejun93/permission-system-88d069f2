<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('动态详情 - 校内网')}"></head>
<body>
<nav th:replace="~{fragments :: topnav('home')}"></nav>

<div class="main-container">
    <aside th:replace="~{fragments :: sidebar}"></aside>

    <div class="content">
        <a href="/" class="back-link">&larr; 返回动态列表</a>

        <!-- 动态不存在 -->
        <div class="card" th:if="${postNotFound}">
            <div class="access-denied">
                <div class="lock-icon">&#128465;</div>
                <div class="denied-title">动态不存在</div>
                <div class="denied-reason">该动态可能已被发布者删除，或链接地址有误</div>
                <div class="denied-actions">
                    <a href="/" class="btn btn-primary btn-sm">返回首页</a>
                </div>
            </div>
        </div>

        <!-- 动态详情 -->
        <div class="card" th:if="${!postNotFound}">
            <div class="feed-item" style="border-bottom:none;">
                <!-- 管理员标记 -->
                <div th:if="${adminHiddenMark}" class="admin-mark admin-mark-hidden">[管理员视角] 此动态已被作者隐藏</div>
                <div th:if="${adminMissingPhotoMark}" class="admin-mark admin-mark-missing">[管理员视角] 内容提及照片但无照片附件</div>

                <div class="feed-header">
                    <a th:href="@{/profile/{id}(id=${author.id})}"><img th:src="${author.avatar}" alt=""></a>
                    <div class="feed-user-info">
                        <a th:href="@{/profile/{id}(id=${author.id})}" class="feed-user-name" th:text="${author.displayName}">用户</a>
                        <div class="feed-meta">
                            <span th:text="${author.className}">班级</span>
                            <span th:if="${author.role == T(com.campus.model.UserRole).SYSTEM_ADMIN}" class="role-tag role-tag-sys">系统管理员</span>
                            <span th:if="${author.role == T(com.campus.model.UserRole).CLASS_ADMIN}" class="role-tag role-tag-class">班级管理员</span>
                            <span style="margin-left:6px;">
                                <span class="online-dot" th:classappend="${author.online} ? 'on' : 'off'"></span>
                                <span th:text="${author.online} ? '在线' : '离线'">在线</span>
                            </span>
                            <span style="margin-left:6px;" th:text="${author.relationshipStatus}">单身</span>
                            <span class="visibility-tag" th:classappend="${post.visibility.toString().toLowerCase()}" th:text="${post.visibility == T(com.campus.model.Visibility).PUBLIC} ? '公开' : (${post.visibility == T(com.campus.model.Visibility).FRIENDS} ? '好友可见' : '仅自己可见')"></span>
                            <span class="status-tag" th:classappend="${post.status.toString().toLowerCase()}" th:if="${post.status != T(com.campus.model.PostStatus).PUBLISHED}" th:text="${post.status == T(com.campus.model.PostStatus).DRAFT} ? '草稿' : '已隐藏'"></span>
                        </div>
                    </div>
                </div>

                <!-- 权限提示：不可见时 -->
                <div th:if="${accessDenied}" class="access-denied">
                    <div class="lock-icon">&#128274;</div>
                    <div class="denied-title">无法查看此动态</div>
                    <div class="denied-reason" th:text="${deniedReason}">权限不足</div>
                    <div class="denied-actions">
                        <a href="/" class="btn btn-outline btn-sm">返回首页</a>
                        <a th:href="@{/profile/{id}(id=${author.id})}" class="btn btn-primary btn-sm">查看发布人主页</a>
                        <button th:if="${authorRelationship == 'NONE'}" class="btn btn-success btn-sm" th:attr="onclick='sendRequest(' + ${author.id} + ', this)'">申请加好友</button>
                        <span th:if="${authorRelationship == 'SENT'}" style="font-size:12px;color:#e65100;">已申请，等待回复</span>
                        <a th:if="${authorRelationship == 'RECEIVED'}" href="/friends?group=pending" class="btn btn-success btn-sm">对方已申请，去处理</a>
                        <span th:if="${authorRelationship == 'FRIEND'}" style="font-size:12px;color:#27ae60;">你们已是好友，但此动态不对你可见</span>
                    </div>
                </div>

                <!-- 可见时：展示内容 -->
                <th:block th:if="${!accessDenied}">
                    <div class="feed-content" th:text="${post.content}">内容</div>
                    <div class="feed-photos" th:if="${post.photoUrls.size() > 0}">
                        <img th:each="url : ${post.photoUrls}" th:src="${url}" alt="照片" loading="lazy">
                    </div>
                    <div class="post-time" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">时间</div>
                    <div class="detail-stats">
                        <span class="like-btn" th:classappend="${hasLiked} ? 'liked'" th:attr="onclick='toggleLike(' + ${post.id} + ', this)'">
                            <span th:text="${hasLiked} ? '&#9829;' : '&#9825;'">&#9825;</span>
                            <span class="like-count" th:text="${likeCount}">0</span> 赞
                        </span>
                        <span>&#128172; <span th:text="${commentCount}">0</span> 评论</span>
                    </div>
                    <!-- 本人操作区 -->
                    <div class="post-ops" th:if="${isOwner}">
                        <select onchange="changePostVisibility(this.dataset.postId, this.value)" th:attr="data-post-id=${post.id}">
                            <option value="PUBLIC" th:selected="${post.visibility == T(com.campus.model.Visibility).PUBLIC}">公开</option>
                            <option value="FRIENDS" th:selected="${post.visibility == T(com.campus.model.Visibility).FRIENDS}">仅好友</option>
                            <option value="PRIVATE" th:selected="${post.visibility == T(com.campus.model.Visibility).PRIVATE}">仅自己</option>
                        </select>
                        <button th:if="${post.status == T(com.campus.model.PostStatus).PUBLISHED}" class="btn btn-outline btn-sm" th:attr="onclick='changePostStatus(' + ${post.id} + ', &quot;HIDDEN&quot;)'">隐藏</button>
                        <button th:if="${post.status == T(com.campus.model.PostStatus).HIDDEN}" class="btn btn-success btn-sm" th:attr="onclick='changePostStatus(' + ${post.id} + ', &quot;PUBLISHED&quot;)'">恢复发布</button>
                        <button th:if="${post.status == T(com.campus.model.PostStatus).DRAFT}" class="btn btn-success btn-sm" th:attr="onclick='changePostStatus(' + ${post.id} + ', &quot;PUBLISHED&quot;)'">发布</button>
                        <button class="btn btn-danger btn-sm" th:attr="onclick='deletePost(' + ${post.id} + ')'">删除</button>
                    </div>
                    <!-- 管理员恢复区 -->
                    <div class="post-ops" th:if="${isAdmin and !isOwner and post.status == T(com.campus.model.PostStatus).HIDDEN and post.visibility != T(com.campus.model.Visibility).PRIVATE}">
                        <button class="btn btn-success btn-sm" th:attr="onclick='adminRestorePost(' + ${post.id} + ')'">恢复此动态</button>
                    </div>
                </th:block>
            </div>
        </div>

        <!-- 评论区（仅可见时显示） -->
        <div class="card" th:if="${!postNotFound and !accessDenied}">
            <div class="card-header">评论 (<span th:text="${commentCount}">0</span>)</div>
            <div class="card-body">
                <!-- 评论区为空时的空状态 -->
                <div th:if="${#lists.isEmpty(topComments)}" class="empty-state" style="padding:20px;">
                    <div class="empty-icon">&#128172;</div>
                    <div class="empty-title" th:if="${isOwner}">还没有人评论</div>
                    <div class="empty-desc" th:if="${isOwner}">来说点什么吧，给自己的动态添点人气</div>
                    <div class="empty-title" th:if="${!isOwner}">暂无评论</div>
                    <div class="empty-desc" th:if="${!isOwner}">成为第一个评论的人</div>
                </div>

                <div th:if="${!#lists.isEmpty(topComments)}" class="comment-list">
                    <div th:each="ci : ${topComments}" class="comment-item">
                        <div class="comment-header">
                            <a th:href="@{/profile/{id}(id=${ci.user.id})}"><img th:src="${ci.user.avatar}" alt=""></a>
                            <a th:href="@{/profile/{id}(id=${ci.user.id})}" class="comment-user" th:text="${ci.user.displayName}">用户</a>
                            <span class="comment-time" th:text="${#temporals.format(ci.comment.createdAt, 'MM-dd HH:mm')}">时间</span>
                            <span th:if="${ci.canDelete}" class="comment-delete-btn" th:attr="onclick='deleteComment(' + ${ci.comment.id} + ')'">删除</span>
                        </div>
                        <div class="comment-body" th:text="${ci.comment.content}">评论内容</div>
                        <div class="comment-reply-btn" th:attr="onclick='setReply(' + ${ci.comment.id} + ', &quot;' + ${ci.user.displayName} + '&quot;)'">回复</div>

                        <div class="reply-list" th:if="${repliesMap.get(ci.comment.id) != null and !repliesMap.get(ci.comment.id).isEmpty()}">
                            <div th:each="reply : ${repliesMap.get(ci.comment.id)}" class="reply-item">
                                <div class="comment-header">
                                    <a th:href="@{/profile/{id}(id=${reply.user.id})}"><img th:src="${reply.user.avatar}" alt=""></a>
                                    <a th:href="@{/profile/{id}(id=${reply.user.id})}" class="comment-user" th:text="${reply.user.displayName}">用户</a>
                                    <span th:if="${reply.replyToUser != null}" class="reply-to" th:text="'回复 @' + ${reply.replyToUser.displayName}"></span>
                                    <span class="comment-time" th:text="${#temporals.format(reply.comment.createdAt, 'MM-dd HH:mm')}">时间</span>
                                    <span th:if="${reply.canDelete}" class="comment-delete-btn" th:attr="onclick='deleteComment(' + ${reply.comment.id} + ')'">删除</span>
                                </div>
                                <div class="comment-body" th:text="${reply.comment.content}">回复内容</div>
                                <div class="comment-reply-btn" th:attr="onclick='setReply(' + ${reply.comment.id} + ', &quot;' + ${reply.user.displayName} + '&quot;)'">回复</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="comment-form">
                    <input id="commentInput" type="text" placeholder="写下你的评论..." th:attr="data-post-id=${post.id}"
                           onkeydown="if(event.key==='Enter') submitCommentWithReply(this.dataset.postId)">
                    <button class="btn btn-primary btn-sm" th:attr="onclick='submitCommentWithReply(' + ${post.id} + ')'">发送</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:replace="~{fragments :: scripts}"></script>
</body>
</html>
