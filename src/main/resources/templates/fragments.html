<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">校园社交</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 顶部导航 -->
<nav th:fragment="topnav(currentPage)" class="top-nav">
    <a href="/" class="logo">校内网</a>
    <div class="nav-links">
        <a href="/" th:classappend="${currentPage == 'home'} ? 'active'">首页</a>
        <a href="/friends" th:classappend="${currentPage == 'friends'} ? 'active'">好友</a>
        <a href="/friends">
            申请
            <span th:if="${pendingCount > 0}" class="badge" th:text="${pendingCount}">0</span>
        </a>
        <a href="/debug" style="color:#e65100;" title="异常场景演示">调试</a>
    </div>
    <!-- 用户切换器 -->
    <div class="user-switcher">
        <span style="font-size:12px;color:rgba(255,255,255,0.7);margin-right:4px;">视角：</span>
        <form method="POST" action="/switch-user" style="display:inline;">
            <select name="userId" onchange="this.form.submit()" class="user-select">
                <option th:each="u : ${allUsers}" th:value="${u.id}" th:selected="${u.id == currentUserId}"
                        th:text="${u.displayName} + ' (' + ${u.className} + ')'">用户</option>
            </select>
        </form>
    </div>
</nav>

<!-- 侧边栏 -->
<aside th:fragment="sidebar" class="sidebar">
    <!-- 用户信息 -->
    <div class="card">
        <div class="profile-card">
            <img th:src="${currentUser.avatar}" alt="avatar">
            <div class="name" th:text="${currentUser.displayName}">用户名</div>
            <div class="class-name" th:text="${currentUser.className}">班级</div>
            <div class="status-row">
                <span>
                    <span class="online-dot" th:classappend="${currentUser.online} ? 'on' : 'off'"></span>
                    <span th:text="${currentUser.online} ? '在线' : '离线'">在线</span>
                </span>
                <span th:text="${currentUser.relationshipStatus}">单身</span>
            </div>
        </div>
    </div>

    <!-- 统计看板 -->
    <div class="card">
        <div class="card-header">数据看板</div>
        <div class="card-body" style="padding:10px;">
            <div class="stats-grid">
                <a class="stat-item stat-clickable" th:href="@{/(relationship='SELF')}" title="我的动态数">
                    <div class="stat-num" th:text="${stats.postCount}">0</div>
                    <div class="stat-label">我的动态</div>
                </a>
                <a class="stat-item stat-clickable" href="/" title="可见动态数">
                    <div class="stat-num" th:text="${stats.visiblePostCount}">0</div>
                    <div class="stat-label">可见动态</div>
                </a>
                <a class="stat-item stat-clickable" th:href="@{/friends(group='friends')}" title="好友数">
                    <div class="stat-num" th:text="${stats.friendCount}">0</div>
                    <div class="stat-label">好友数</div>
                </a>
                <a class="stat-item stat-clickable" th:href="@{/friends(group='pending')}" title="待处理申请">
                    <div class="stat-num" th:text="${stats.pendingRequestCount}">0</div>
                    <div class="stat-label">待处理申请</div>
                </a>
            </div>
            <div style="margin-top:8px;font-size:11px;color:#aaa;text-align:center;">照片统计（点击筛选对应可见范围）</div>
            <div class="stats-grid" style="margin-top:4px;">
                <a class="stat-item stat-clickable" th:href="@{/(visibility='PUBLIC')}" title="公开照片">
                    <div class="stat-num" th:text="${stats.publicPhotoCount}">0</div>
                    <div class="stat-label">公开照片</div>
                </a>
                <a class="stat-item stat-clickable" th:href="@{/(visibility='FRIENDS')}" title="好友可见照片">
                    <div class="stat-num" th:text="${stats.friendsOnlyPhotoCount}">0</div>
                    <div class="stat-label">好友照片</div>
                </a>
                <a class="stat-item stat-clickable" th:href="@{/(visibility='PRIVATE')}" title="仅自己可见照片">
                    <div class="stat-num" th:text="${stats.privatePhotoCount}">0</div>
                    <div class="stat-label">私密照片</div>
                </a>
                <a class="stat-item stat-clickable" href="/" title="可见照片">
                    <div class="stat-num" th:text="${stats.visiblePhotoCount}">0</div>
                    <div class="stat-label">可见照片</div>
                </a>
            </div>
            <div style="margin-top:8px;font-size:11px;color:#aaa;text-align:center;">评论统计（点击筛选有评论动态）</div>
            <div class="stats-grid" style="margin-top:4px;">
                <a class="stat-item stat-clickable" th:href="@{/(hasComment='yes')}" title="有评论的动态">
                    <div class="stat-num" th:text="${stats.commentCount}">0</div>
                    <div class="stat-label">可见评论</div>
                </a>
                <a class="stat-item stat-clickable" th:href="@{/(relationship='FRIEND')}" title="好友的动态">
                    <div class="stat-num" th:text="${stats.friendCount}">0</div>
                    <div class="stat-label">好友动态</div>
                </a>
            </div>
        </div>
    </div>

    <!-- 待处理申请 -->
    <div class="card" th:if="${pendingCount > 0}">
        <div class="card-header">
            好友申请
            <span class="badge" th:text="${pendingCount}">0</span>
        </div>
        <div class="card-body">
            <div th:each="req : ${pendingRequests}" class="request-item">
                <img th:src="${@userService.findById(req.fromUserId).avatar}" alt="">
                <div class="request-info">
                    <div class="request-name" th:text="${@userService.findById(req.fromUserId).displayName}">用户</div>
                </div>
                <div class="request-actions">
                    <button class="btn btn-success btn-sm" th:attr="onclick='acceptRequest(' + ${req.id} + ')'">同意</button>
                    <button class="btn btn-danger btn-sm" th:attr="onclick='rejectRequest(' + ${req.id} + ')'">拒绝</button>
                </div>
            </div>
        </div>
    </div>
</aside>

<script th:fragment="scripts">
function showToast(msg, type) {
    var t = document.createElement('div');
    t.className = 'toast ' + (type || '');
    t.textContent = msg;
    document.body.appendChild(t);
    t.style.display = 'block';
    setTimeout(function() { t.remove(); }, 3000);
}

// 通用 API 错误处理
function handleApiError(r) {
    if (r.ok) return r.json();
    return r.json().then(d => {
        var err = new Error(d.error || d.reason || '操作失败');
        err.data = d;
        err.status = r.status;
        throw err;
    });
}

// 操作后刷新页面（保留当前筛选参数）
function reloadWithFilters() {
    location.reload();
}

function acceptRequest(id) {
    fetch('/api/friend-request/' + id + '/accept', {method: 'POST'})
        .then(r => handleApiError(r))
        .then(() => { showToast('已同意好友申请', 'success'); setTimeout(() => reloadWithFilters(), 600); })
        .catch(e => { showToast(e.data ? e.data.hint || e.message : '操作失败', 'error'); });
}

function rejectRequest(id) {
    fetch('/api/friend-request/' + id + '/reject', {method: 'POST'})
        .then(r => handleApiError(r))
        .then(() => { showToast('已拒绝好友申请', 'error'); setTimeout(() => reloadWithFilters(), 600); })
        .catch(e => { showToast(e.data ? e.data.hint || e.message : '操作失败', 'error'); });
}

function sendRequest(toUserId, btn) {
    fetch('/api/friend-request?toUserId=' + toUserId, {method: 'POST'})
        .then(r => handleApiError(r))
        .then(d => {
            if (d.error) {
                showToast(d.error + (d.hint ? ' - ' + d.hint : ''), 'error');
                if (d.status === 'RECEIVED') { btn.textContent = '待处理'; btn.disabled = true; btn.className = 'btn btn-sm btn-outline'; }
                return;
            }
            showToast('好友申请已发送', 'success');
            btn.textContent = '已申请';
            btn.disabled = true;
            btn.className = 'btn btn-sm btn-outline';
        })
        .catch(e => { showToast(e.data ? e.data.hint || e.message : '操作失败', 'error'); });
}

function publishPost() {
    var content = document.getElementById('postContent').value.trim();
    if (!content) { showToast('请输入内容', 'error'); return; }
    var visibility = document.getElementById('postVisibility').value;
    var photoUrl = document.getElementById('postPhotoUrl').value.trim();
    var status = document.getElementById('postStatus') ? document.getElementById('postStatus').value : 'PUBLISHED';

    var formData = new FormData();
    formData.append('content', content);
    formData.append('visibility', visibility);
    formData.append('status', status);
    if (photoUrl) formData.append('photoUrl', photoUrl);

    fetch('/api/posts', {method: 'POST', body: formData})
        .then(r => handleApiError(r))
        .then(() => { showToast(status === 'DRAFT' ? '已存为草稿' : '发布成功', 'success'); setTimeout(() => reloadWithFilters(), 600); })
        .catch(e => { showToast(e.data ? e.data.hint || e.message : '发布失败', 'error'); });
}

function submitComment(postId, replyToId) {
    var input = document.getElementById('commentInput');
    var content = input.value.trim();
    if (!content) { showToast('请输入评论内容', 'error'); return; }

    var params = 'content=' + encodeURIComponent(content);
    if (replyToId) params += '&replyToId=' + replyToId;

    fetch('/api/posts/' + postId + '/comments', {method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: params})
        .then(r => handleApiError(r))
        .then(() => { showToast('评论成功', 'success'); setTimeout(() => reloadWithFilters(), 600); })
        .catch(e => {
            var hint = e.data ? (e.data.hint || e.data.reason || e.message) : e.message;
            showToast(hint, 'error');
        });
}

function setReply(commentId, userName) {
    var input = document.getElementById('commentInput');
    input.value = '@' + userName + ' ';
    input.focus();
    input.dataset.replyTo = commentId;
}

function submitCommentWithReply(postId) {
    var input = document.getElementById('commentInput');
    var content = input.value.trim();
    if (!content) return;
    var replyToId = input.dataset.replyTo || '';
    submitComment(postId, replyToId || null);
}

function toggleLike(postId, el) {
    fetch('/api/posts/' + postId + '/like', {method: 'POST'})
        .then(r => handleApiError(r))
        .then(data => {
            var countEl = el.querySelector('.like-count') || el.parentElement.querySelector('.like-count');
            if (data.liked) {
                el.classList.add('liked');
                if (countEl) countEl.textContent = data.likeCount;
            } else {
                el.classList.remove('liked');
                if (countEl) countEl.textContent = data.likeCount;
            }
        })
        .catch(e => { showToast(e.data ? e.data.hint || e.message : '操作失败', 'error'); });
}

function acceptRequestOnProfile(id) {
    fetch('/api/friend-request/' + id + '/accept', {method: 'POST'})
        .then(r => handleApiError(r))
        .then(() => { showToast('已同意好友申请', 'success'); setTimeout(() => reloadWithFilters(), 600); })
        .catch(e => { showToast(e.data ? e.data.hint || e.message : '操作失败', 'error'); });
}

function rejectRequestOnProfile(id) {
    fetch('/api/friend-request/' + id + '/reject', {method: 'POST'})
        .then(r => handleApiError(r))
        .then(() => { showToast('已拒绝好友申请', 'error'); setTimeout(() => reloadWithFilters(), 600); })
        .catch(e => { showToast(e.data ? e.data.hint || e.message : '操作失败', 'error'); });
}

function changePostStatus(postId, newStatus) {
    var formData = new FormData();
    formData.append('status', newStatus);
    fetch('/api/posts/' + postId + '/status', {method: 'POST', body: formData})
        .then(r => handleApiError(r))
        .then(() => { showToast('状态已更新', 'success'); setTimeout(() => reloadWithFilters(), 600); })
        .catch(e => { showToast(e.data ? e.data.hint || e.message : '操作失败', 'error'); });
}

function changePostVisibility(postId, newVisibility) {
    var formData = new FormData();
    formData.append('visibility', newVisibility);
    fetch('/api/posts/' + postId + '/visibility', {method: 'POST', body: formData})
        .then(r => handleApiError(r))
        .then(() => { showToast('可见范围已更新', 'success'); setTimeout(() => reloadWithFilters(), 600); })
        .catch(e => {
            if (e.data && e.data.retry) {
                showToast(e.data.error + ' - ' + e.data.hint, 'error');
            } else {
                showToast(e.data ? e.data.hint || e.message : '操作失败', 'error');
            }
        });
}

function deletePost(postId) {
    if (!confirm('确定删除此动态？')) return;
    fetch('/api/posts/' + postId, {method: 'DELETE'})
        .then(r => handleApiError(r))
        .then(() => { showToast('已删除', 'error'); setTimeout(() => reloadWithFilters(), 600); })
        .catch(e => { showToast(e.data ? e.data.hint || e.message : '操作失败', 'error'); });
}
</script>

</body>
</html>
